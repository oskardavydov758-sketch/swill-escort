<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SWILL ESCORT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --red: #e63946;
            --red-dark: #b71c1c;
            --text: #ffffff;
            --text-secondary: #aaaaaa;
            --gold: #ffd700;
            --green: #4caf50;
            --border: #2a2a2a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            overflow-x: hidden;
        }
        .screen { display: none; padding-bottom: 70px; min-height: 100vh; }
        .screen.active { display: block; }
        .banner-placeholder {
            width: 100%; height: 140px;
            background: linear-gradient(135deg, #1a1a1a, #2d0000);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: var(--red); letter-spacing: 3px;
        }
        .section-title { font-size: 22px; font-weight: 700; padding: 16px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); }
        .divider { height: 2px; background: linear-gradient(90deg, transparent, var(--red), transparent); margin: 0 16px 16px; }
        .tabbar {
            position: fixed; bottom: 0; left: 0; right: 0; height: 60px;
            background: #0d0d0d; display: flex; border-top: 1px solid var(--border); z-index: 100;
        }
        .tab {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 10px; cursor: pointer; transition: .2s;
            border: none; background: none; gap: 4px;
        }
        .tab.active { color: var(--red); }
        .tab-icon { font-size: 20px; }
        .catalog-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; }
        .girl-card { background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer; transition: .2s; border: 1px solid transparent; }
        .girl-card:active { border-color: var(--red); transform: scale(0.97); }
        .girl-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #1a1a1a; }
        .girl-info { padding: 8px 10px; }
        .girl-name { font-size: 14px; font-weight: 600; }
        .girl-rating { font-size: 11px; color: var(--gold); }
        .girl-price { font-size: 12px; color: var(--red); font-weight: 600; }
        .detail-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .detail-info { padding: 16px; }
        .detail-params { display: flex; gap: 16px; margin: 12px 0; flex-wrap: wrap; }
        .detail-param { background: var(--card); padding: 6px 12px; border-radius: 8px; font-size: 12px; }
        .price-options { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
        .price-option { flex: 1; min-width: 100px; padding: 10px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-size: 12px; transition: .2s; }
        .price-option.selected { border-color: var(--red); background: #1a0000; }
        .btn { display: block; width: 100%; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: 1px; transition: .2s; text-align: center; margin-top: 8px; }
        .btn:active { background: var(--red-dark); transform: scale(0.98); }
        .btn-outline { background: transparent; border: 2px solid var(--red); color: var(--red); }
        .btn-sm { padding: 8px 16px; font-size: 12px; display: inline; width: auto; margin: 4px; }
        .input { width: 100%; padding: 12px 16px; background: var(--card); border: 2px solid var(--border); border-radius: 10px; color: #fff; font-size: 16px; margin-bottom: 10px; outline: none; }
        .input:focus { border-color: var(--red); }
        .pin-dots { display: flex; gap: 12px; justify-content: center; margin: 24px 0; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--card); border: 2px solid var(--border); transition: .2s; }
        .pin-dot.filled { background: var(--red); border-color: var(--red); }
        .pin-dot.error { animation: shake 0.5s; background: var(--red); border-color: var(--red); }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }
        .pin-keyboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; max-width: 280px; margin: 0 auto; }
        .pin-key { aspect-ratio: 1; background: var(--card); border: none; border-radius: 12px; color: #fff; font-size: 22px; cursor: pointer; transition: .1s; }
        .pin-key:active { background: var(--red); }
        .profile-header { text-align: center; padding: 20px; }
        .profile-balance { font-size: 36px; font-weight: 700; color: var(--red); }
        .profile-section { background: var(--card); margin: 8px 12px; padding: 16px; border-radius: 12px; }
        .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        .chat-messages { overflow-y: auto; padding: 12px; min-height: 200px; max-height: calc(100vh - 350px); }
        .chat-msg { margin-bottom: 8px; max-width: 85%; padding: 10px 14px; border-radius: 14px; font-size: 14px; }
        .chat-msg.user { background: var(--red); margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-msg.support { background: var(--card); margin-right: auto; border-bottom-left-radius: 4px; }
        .chat-topics { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; }
        .chat-topic { padding: 6px 12px; background: var(--card); border: 1px solid var(--border); border-radius: 16px; font-size: 11px; cursor: pointer; }
        .chat-topic:active { background: var(--red); }
        .promo-card { background: var(--card); margin: 10px 12px; padding: 16px; border-radius: 12px; border-left: 3px solid var(--red); }
        .promo-code { background: #1a1a1a; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 18px; color: var(--red); text-align: center; letter-spacing: 2px; cursor: pointer; margin: 8px 0; }
        .spinner { display: none; text-align: center; padding: 40px; }
        .spinner.active { display: block; }
        .spinner-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: var(--red); margin: 0 4px; animation: bounce 1.4s infinite ease-in-out both; }
        .spinner-dot:nth-child(1) { animation-delay: -0.32s; }
        .spinner-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #fff; padding: 12px 24px; border-radius: 10px; z-index: 200; opacity: 0; transition: .3s; font-weight: 600; }
        .toast.show { opacity: 1; }
        .back-btn { padding: 12px 16px; font-size: 16px; color: var(--red); cursor: pointer; background: none; border: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="app">
    <!-- ЭКРАН РЕГИСТРАЦИИ -->
    <div class="screen active" id="screen-register">
        <div class="banner-placeholder">SWILL ESCORT</div>
        <div style="padding: 0 16px;">
            <h2 class="section-title" style="padding-left:0">👤 Регистрация</h2>
            <div class="divider" style="margin-left:0;margin-right:0"></div>
            <input class="input" id="reg-name" placeholder="Имя">
            <div style="display:flex;gap:8px;align-items:center">
                <input class="input" id="reg-birthday" placeholder="Дата рождения (ДД.ММ.ГГГГ)" style="flex:1">
                <span style="cursor:pointer;font-size:20px" onclick="showToast('🎂 Скидка 50% в День Рождения!')">❓</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <input class="input" id="reg-pin" placeholder="ПИН-код (4 цифры)" maxlength="4" type="password" style="flex:1">
                <span style="cursor:pointer;font-size:20px" onclick="showToast('🔐 Запомните код для входа!')">❓</span>
            </div>
            <input class="input" id="reg-promo" placeholder="Промокод (если есть)">
            <button class="btn" onclick="register()">✅ Зарегистрироваться</button>
        </div>
    </div>

    <!-- ЭКРАН ВХОДА -->
    <div class="screen" id="screen-login">
        <div class="banner-placeholder">SWILL ESCORT</div>
        <h2 class="section-title">🔑 Вход</h2>
        <div class="divider"></div>
        <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
        <p style="text-align:center;min-height:20px;color:var(--red)" id="pin-error"></p>
        <div class="pin-keyboard" id="pin-kb"></div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
    <div class="screen" id="screen-main">
        <div id="tab-catalog"></div>
        <div id="tab-promo" class="hidden"></div>
        <div id="tab-chat" class="hidden"></div>
        <div id="tab-profile" class="hidden"></div>
    </div>

    <!-- ТАББАР -->
    <div class="tabbar hidden" id="tabbar">
        <button class="tab active" onclick="switchTab('catalog')"><span class="tab-icon">🔥</span>Каталог</button>
        <button class="tab" onclick="switchTab('promo')"><span class="tab-icon">🎁</span>Акции</button>
        <button class="tab" onclick="switchTab('chat')"><span class="tab-icon">💬</span>Чат</button>
        <button class="tab" onclick="switchTab('profile')"><span class="tab-icon">👤</span>Ты</button>
    </div>

    <div class="spinner" id="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>
    <div class="toast" id="toast"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
let uid = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : 'test123';
let user = null;
let currentGirl = null;
let selectedPrice = null;
let selectedHours = 1;
let pin = '';
let chatTopic = '';
const API = '/api';
tg.ready(); tg.expand();

function showToast(t) {
    const el = document.getElementById('toast');
    el.innerText = t; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
    document.getElementById('tabbar').classList.toggle('hidden', name !== 'main');
}

function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.closest('.tab').classList.add('active');
    ['catalog','promo','chat','profile'].forEach(t => document.getElementById('tab-'+t).classList.add('hidden'));
    document.getElementById('tab-'+tab).classList.remove('hidden');
    if (tab === 'catalog') loadCatalog();
    if (tab === 'promo') loadPromos();
    if (tab === 'chat') loadChat();
    if (tab === 'profile') loadProfile();
    currentTab = tab;
}

function loadUser() {
    fetch(API + '/user/' + uid).then(r => r.json()).then(d => {
        if (d.error) showScreen('register');
        else { user = d; showScreen('login'); buildPinKB(); }
    });
}

// ===== РЕГИСТРАЦИЯ =====
function register() {
    const name = document.getElementById('reg-name').value.trim();
    const birthday = document.getElementById('reg-birthday').value.trim();
    const pinVal = document.getElementById('reg-pin').value.trim();
    const promo = document.getElementById('reg-promo').value.trim();
    if (!name || pinVal.length !== 4) return showToast('Заполните все поля');
    fetch(API + '/register', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({uid, name, birthday, pin: pinVal, promo})
    }).then(r => r.json()).then(d => {
        if (d.success) {
            user = {name, birthday, pin: pinVal, promo_code: d.promo_code, balance: 0, invited: 0, history: []};
            showScreen('main'); switchTab('catalog'); showToast('✅ Успешно!');
        } else showToast('❌ Ошибка');
    });
}

// ===== ПИН-КОД =====
function buildPinKB() {
    const kb = document.getElementById('pin-kb');
    [1,2,3,4,5,6,7,8,9,'⌫',0,'✓'].forEach(d => {
        const btn = document.createElement('button');
        btn.className = 'pin-key'; btn.innerText = d;
        btn.onclick = () => {
            if (d === '⌫') pin = pin.slice(0, -1);
            else if (d === '✓') { if (pin.length === 4) verifyPin(); return; }
            else if (pin.length < 4) pin += String(d);
            updateDots();
            if (pin.length === 4) setTimeout(verifyPin, 300);
        };
        kb.appendChild(btn);
    });
}
function updateDots() { for (let i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled', i < pin.length); }
function verifyPin() {
    if (pin === user.pin) { showScreen('main'); switchTab('catalog'); showToast('✅ Добро пожаловать!'); }
    else { document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error')); document.getElementById('pin-error').innerText = 'Неверный ПИН-код'; pin = ''; setTimeout(updateDots, 500); }
}

// ===== КАТАЛОГ =====
function loadCatalog() {
    fetch(API + '/girls').then(r => r.json()).then(girls => {
        document.getElementById('tab-catalog').innerHTML = `
            <div class="banner-placeholder">SWILL ESCORT</div>
            <div class="catalog-grid">${girls.map(g => `
                <div class="girl-card" onclick="showGirl(${g.id})">
                    <img class="girl-photo" src="${g.photos?.[0] || 'https://via.placeholder.com/300x400/1a1a1a/e63946?text='+encodeURIComponent(g.name)}">
                    <div class="girl-info">
                        <div class="girl-name">${g.name}, ${g.age}</div>
                        <div class="girl-rating">⭐ ${g.rating||'4.8'}</div>
                        <div class="girl-price">от ${g.price_1h} BYN</div>
                    </div>
                </div>`).join('')}</div>`;
    });
}

function showGirl(id) {
    fetch(API + '/girls').then(r => r.json()).then(girls => {
        const g = girls.find(x => x.id === id);
        if (!g) return;
        currentGirl = g;
        document.getElementById('tab-catalog').innerHTML = `
            <button class="back-btn" onclick="loadCatalog()">← Назад</button>
            <img class="detail-photo" src="${g.photos?.[0] || 'https://via.placeholder.com/400x600/1a1a1a/e63946?text='+encodeURIComponent(g.name)}">
            <div class="detail-info">
                <h2>${g.name}, ${g.age} лет</h2>
                <div style="color:var(--gold)">⭐ ${g.rating||'4.8'} (${(g.reviews||[]).length} отзывов)</div>
                <div class="detail-params">
                    <span class="detail-param">📏 ${g.height} см</span>
                    <span class="detail-param">⚖️ ${g.weight} кг</span>
                    <span class="detail-param">🍒 ${g.chest} разм.</span>
                </div>
                <div class="price-options">
                    ${g.price_1h ? `<div class="price-option selected" onclick="selPrice(this,${g.price_1h},1)">1 час<br>${g.price_1h} BYN</div>` : ''}
                    ${g.price_2h ? `<div class="price-option" onclick="selPrice(this,${g.price_2h},2)">2 часа<br>${g.price_2h} BYN</div>` : ''}
                    ${g.price_night ? `<div class="price-option" onclick="selPrice(this,${g.price_night},8)">Ночь<br>${g.price_night} BYN</div>` : ''}
                </div>
                <input class="input" id="booking-promo" placeholder="Промокод">
                <button class="btn" onclick="book(${g.id},${g.price_1h})">💎 Забронировать</button>
                <div style="margin-top:16px"><h3>⭐ Отзывы:</h3>${(g.reviews||[]).slice(-3).reverse().map(r => `<div style="background:var(--card);padding:10px;border-radius:8px;margin:6px 0"><b>${r.name}</b>: ${'★'.repeat(r.rating)} "${r.text}"</div>`).join('')||'<p style="color:var(--text-secondary)">Нет отзывов</p>'}</div>
            </div>`;
        selectedPrice = g.price_1h; selectedHours = 1;
    });
}
function selPrice(el, price, hours) {
    document.querySelectorAll('.price-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected'); selectedPrice = price; selectedHours = hours;
}
function book(gid, price) {
    document.getElementById('spinner').classList.add('active');
    setTimeout(() => {
        document.getElementById('spinner').classList.remove('active');
        document.getElementById('tab-catalog').innerHTML = `
            <div style="text-align:center;padding:40px 20px">
                <div style="font-size:48px">❌</div>
                <h2>Недостаточно средств</h2>
                <p style="color:var(--text-secondary);margin:12px 0">Пополните баланс для бронирования</p>
                <button class="btn" onclick="showDeposit()">💳 Пополнить баланс</button>
            </div>`;
    }, 2000);
}

// ===== ПОПОЛНЕНИЕ =====
function showDeposit() {
    document.getElementById('tab-catalog').innerHTML = `
        <button class="back-btn" onclick="loadCatalog()">← Назад</button>
        <h2 class="section-title">💳 Пополнение</h2>
        <div class="divider"></div>
        <div style="padding:0 16px">
            <input class="input" id="dep-amount" type="number" min="200" value="200" placeholder="Сумма BYN (мин. 200)">
            <p style="margin:12px 0;font-weight:600">Способ оплаты:</p>
            <button class="btn" onclick="showCrypto()">💎 Криптовалюта (USDT TRC20)</button>
            <button class="btn btn-outline" onclick="showCardBlock()">💳 Банковская карта</button>
        </div>`;
}
function showCrypto() {
    const amt = document.getElementById('dep-amount')?.value || 200;
    fetch(API + '/rate').then(r => r.json()).then(d => {
        const usdt = (amt / d.rate).toFixed(2);
        document.getElementById('tab-catalog').innerHTML = `
            <button class="back-btn" onclick="showDeposit()">← Назад</button>
            <h2 class="section-title">💳 ${amt} BYN</h2>
            <div class="divider"></div>
            <div style="padding:0 16px">
                <p>USDT (TRC20):</p>
                <div class="promo-code" onclick="copyText('${d.address}')">${d.address}</div>
                <p style="text-align:center;color:var(--text-secondary);font-size:12px">(нажмите чтобы скопировать)</p>
                <p style="margin-top:12px">Сумма: ${usdt} USDT <span style="cursor:pointer" onclick="showToast('💡 Конвертация по курсу ~${d.rate} BYN/USDT')">❓</span></p>
                <p style="color:var(--text-secondary);margin:12px 0;font-size:13px">Деньги поступают в течение 5 минут. Если не поступили — обратитесь в поддержку.</p>
                <p style="color:var(--text-secondary);font-size:13px;margin-top:8px">⚠️ В настоящее время пополнение с банковской карты недоступно. Проводятся технические обновления. Для пополнения через карту обратитесь в поддержку.</p>
            </div>`;
    });
}
function showCardBlock() {
    document.getElementById('tab-catalog').innerHTML = `
        <button class="back-btn" onclick="showDeposit()">← Назад</button>
        <h2 class="section-title">💳 Банковская карта</h2>
        <div class="divider"></div>
        <div style="padding:0 16px;text-align:center">
            <div style="font-size:48px;margin:20px 0">⚠️</div>
            <h3>Пополнение недоступно</h3>
            <p style="color:var(--text-secondary);margin:12px 0">В настоящее время пополнение с банковской карты недоступно. Проводятся технические обновления.</p>
            <p style="color:var(--text-secondary);margin:12px 0">Для пополнения через карту обратитесь в поддержку.</p>
            <button class="btn btn-outline" onclick="showDeposit()">🔄 Выбрать другой способ</button>
        </div>`;
}

// ===== АКЦИИ =====
function loadPromos() {
    document.getElementById('tab-promo').innerHTML = `
        <div class="banner-placeholder">SWILL ESCORT</div>
        <h2 class="section-title">🎁 Акции</h2>
        <div class="divider"></div>
        <div class="promo-card"><h3>🔥 СКИДКА 30%</h3><p>на первую бронь</p><div class="promo-code" onclick="copyText('FIRST30')">FIRST30</div><p style="font-size:11px;color:var(--text-secondary)">Действует только один раз!</p></div>
        <div class="promo-card"><h3>👥 ПРИВЕДИ ДРУГА</h3><p>Твой код:</p><div class="promo-code" onclick="copyText('${user?.promo_code||''}')">${user?.promo_code||'---'}</div><p>+30 BYN <span onclick="showToast('👥 Друг должен указать твой промокод при регистрации. Когда он пополнит баланс от 150 BYN — ты получишь 30 BYN.')">❓</span></p><p>Приглашено: ${user?.invited||0}</p></div>
        <div class="promo-card"><h3>🎂 ДЕНЬ РОЖДЕНИЯ</h3><p>Скидка 50% в твой день рождения</p></div>`;
}

// ===== ЧАТ =====
function loadChat() {
    document.getElementById('tab-chat').innerHTML = `
        <div class="banner-placeholder">SWILL ESCORT</div>
        <h2 class="section-title">💬 Поддержка</h2>
        <div class="divider"></div>
        <div class="chat-messages" id="chat-msgs"><div class="chat-msg support">💬 Добро пожаловать! Выберите тему или опишите вопрос.</div></div>
        <div class="chat-topics">
            <span class="chat-topic" onclick="setTopic('💰 Пополнение')">💰 Пополнение</span>
            <span class="chat-topic" onclick="setTopic('🎁 Акции')">🎁 Акции</span>
            <span class="chat-topic" onclick="setTopic('👩 Сотрудничество')">👩 Сотрудничество</span>
            <span class="chat-topic" onclick="setTopic('📋 Другое')">📋 Другое</span>
            <span class="chat-topic" onclick="setTopic('👤 Оператор')">👤 Оператор</span>
        </div>
        <div style="padding:8px 12px;display:flex;gap:8px">
            <input class="input" id="chat-input" placeholder="Сообщение..." style="flex:1;margin:0">
            <button class="btn btn-sm" onclick="sendChat()" style="width:50px">➤</button>
        </div>`;
}
function setTopic(t) {
    chatTopic = t;
    document.getElementById('chat-msgs').innerHTML += `<div class="chat-msg support">📂 ${t}. Опишите вопрос. Оператор скоро свяжется с вами.</div>`;
}
function sendChat() {
    const inp = document.getElementById('chat-input');
    const text = inp.value.trim();
    if (!text) return;
    document.getElementById('chat-msgs').innerHTML += `<div class="chat-msg user">${text}</div>`;
    inp.value = '';
    fetch(API + '/support', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({uid, text, topic: chatTopic || 'Другое'})
    });
}

// ===== ПРОФИЛЬ =====
function loadProfile() {
    document.getElementById('tab-profile').innerHTML = `
        <div class="banner-placeholder">SWILL ESCORT</div>
        <div class="profile-header">
            <div class="profile-balance">${user?.balance||0} BYN</div>
            <button class="btn btn-outline" onclick="showDeposit()" style="margin-top:8px">💳 Пополнить</button>
        </div>
        <div class="profile-section"><h3>📋 История</h3><div>${(user?.history||[]).map(h => `• ${h.action==='deposit'?'💰 Пополнение '+h.amount+' BYN':'👩 Бронь: '+h.girl+' ('+h.price+' BYN)'} — ${h.date}`).join('<br>')||'<p style="color:var(--text-secondary)">Пусто</p>'}</div></div>
        <div class="profile-section">
            <div class="profile-row"><span>🎟 Промокод</span><span style="color:var(--red);font-family:monospace" onclick="copyText('${user?.promo_code||''}')">${user?.promo_code||'---'}</span></div>
            <div class="profile-row"><span>👥 Приглашено</span><span>${user?.invited||0}</span></div>
        </div>
        <div class="profile-section"><div class="profile-row"><span>🎂 Дата рождения</span><span>${user?.birthday||'---'}</span></div></div>
        <div class="profile-section"><p>👱‍♀️ Ты девушка? Хочешь сотрудничать?</p><button class="btn btn-outline" onclick="applyModel()">📩 Подать заявку</button></div>`;
}
function applyModel() {
    if (user._applied) return showToast('✅ Заявка уже отправлена. Мы свяжемся с вами.');
    fetch(API + '/apply', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            uid, name: user.name,
            age: prompt('Возраст:'),
            height: prompt('Рост (165-180):'),
            weight: prompt('Вес (47-80):'),
            chest: prompt('Грудь (0.5-4):')
        })
    }).then(r => r.json()).then(d => {
        if (d.success) { user._applied = true; showToast('✅ Отправлено!'); }
        else if (d.error === 'already_applied') { user._applied = true; showToast('✅ Заявка уже отправлена.'); }
    });
}

function copyText(t) { navigator.clipboard.writeText(t).then(() => showToast('✅ Скопировано!')); }

let currentTab = 'catalog';
loadUser();
</script>
